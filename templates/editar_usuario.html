{% extends "base.html" %}

{% block content %}
<div class="row mb-3">
    <div class="col">
        <a href="{{ url_for('listar_usuarios') }}" class="btn btn-outline-secondary"><i class="fas fa-arrow-left"></i> Voltar</a>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-md-6 mb-4">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="fas fa-user-edit me-2"></i> Editar Usuário</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nome Completo</label>
                        <input type="text" class="form-control" name="nome" value="{{ user.nome }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Username (Login)</label>
                        <input type="text" class="form-control" name="username" value="{{ user.username }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email Institucional</label>
                        <input type="email" class="form-control" name="email" value="{{ user.email }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nova Senha</label>
                        <input type="password" class="form-control" name="password" placeholder="Deixe em branco para não alterar a senha">
                        <small class="text-muted">Preencha apenas se quiser trocar a senha atual.</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Função (Role)</label>
                        <select class="form-select" name="role" required>
                            <option value="ENTREVISTADOR" {% if user.role == 'ENTREVISTADOR' %}selected{% endif %}>Oficial Entrevistador</option>
                            <option value="AUXILIAR_P2" {% if user.role == 'AUXILIAR_P2' %}selected{% endif %}>Auxiliar P2</option>
                            <option value="P2" {% if user.role == 'P2' %}selected{% endif %}>Oficial P2</option>
                            <option value="AUXILIAR_SJD" {% if user.role == 'AUXILIAR_SJD' %}selected{% endif %}>Auxiliar SJD</option>
                            <option value="SJD" {% if user.role == 'SJD' %}selected{% endif %}>Oficial SJD</option>
                            <option value="SUBCMT" {% if user.role == 'SUBCMT' %}selected{% endif %}>Subcomandante</option>
                            <option value="CMT" {% if user.role == 'CMT' %}selected{% endif %}>Comandante</option>
                            <option value="ADMIN" {% if user.role == 'ADMIN' %}selected{% endif %}>Administrador P1</option>
                        </select>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary"><i class="fas fa-save me-2"></i> Atualizar Usuário</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
