{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-lg border-0 rounded-pL">
            <div class="card-header baep-blue text-center py-4">
                <i class="fas fa-lock fa-3x mb-3"></i>
                <h4 class="mb-0">Acesso Restrito</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="form-outline mb-4">
                        <input type="text" id="username" name="username" class="form-control form-control-lg" required />
                        <label class="form-label" for="username">Usuário</label>
                    </div>

                    <div class="form-outline mb-4">
                        <input type="password" id="password" name="password" class="form-control form-control-lg" required />
                        <label class="form-label" for="password">Senha</label>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg" style="background-color: #0c2b4e;">
                            <i class="fas fa-sign-in-alt me-2"></i> Entrar
                        </button>
                    </div>
                </form>
                
                <div class="text-center mt-4 pt-2 border-top">
                    <button type="button" class="btn btn-link btn-sm text-muted" data-mdb-toggle="modal" data-mdb-target="#qrModal">
                        <i class="fas fa-qrcode me-1"></i> Compartilhar acesso via QR Code
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal QR Code -->
<div class="modal fade" id="qrModal" tabindex="-1" aria-labelledby="qrModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content text-center">
      <div class="modal-header border-0 pb-0">
        <button type="button" class="btn-close" data-mdb-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body pt-0">
        <h5 class="modal-title mb-3" id="qrModalLabel">Acesso Rápido ao Sistema</h5>
        <img src="data:image/png;base64,{{ qr_base64 }}" alt="QR Code de Acesso" class="img-fluid mb-3" style="max-width: 250px;">
        <p class="small text-muted">Aponte a câmera do seu celular para este código para acessar o sistema instantaneamente.</p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
