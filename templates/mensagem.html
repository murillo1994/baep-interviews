{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <div class="card shadow border-0">
            <div class="card-body p-5">
                {% if type == 'success' %}
                    <i class="fas fa-check-circle text-success fa-4x mb-4"></i>
                {% else %}
                    <i class="fas fa-info-circle text-info fa-4x mb-4"></i>
                {% endif %}
                
                <h4 class="mb-3">{{ msg }}</h4>
                <a href="{{ url_for('index') }}" class="btn btn-primary mt-3">Início</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
